<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <title>CPSM</title>
  <!-- Terminal-style background -->
  <rect x="2" y="6" rx="6" ry="6" width="60" height="52" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
  <!-- Title bar dots -->
  <circle cx="9" cy="13" r="1.6" fill="#ef4444"/>
  <circle cx="14" cy="13" r="1.6" fill="#f59e0b"/>
  <circle cx="19" cy="13" r="1.6" fill="#22c55e"/>
  <!-- Tiled-pane grid suggesting multi-session layout -->
  <rect x="6"  y="20" rx="2" ry="2" width="24" height="14" fill="#0f172a" stroke="#3b82f6" stroke-width="1"/>
  <rect x="34" y="20" rx="2" ry="2" width="24" height="14" fill="#0f172a" stroke="#10b981" stroke-width="1"/>
  <rect x="6"  y="38" rx="2" ry="2" width="24" height="14" fill="#0f172a" stroke="#f59e0b" stroke-width="1"/>
  <rect x="34" y="38" rx="2" ry="2" width="24" height="14" fill="#0f172a" stroke="#a855f7" stroke-width="1"/>
  <!-- Prompt glyphs in each pane -->
  <text x="9"  y="30" font-family="monospace" font-size="7" font-weight="bold" fill="#3b82f6">$</text>
  <text x="37" y="30" font-family="monospace" font-size="7" font-weight="bold" fill="#10b981">$</text>
  <text x="9"  y="48" font-family="monospace" font-size="7" font-weight="bold" fill="#f59e0b">$</text>
  <text x="37" y="48" font-family="monospace" font-size="7" font-weight="bold" fill="#a855f7">$</text>
</svg>
